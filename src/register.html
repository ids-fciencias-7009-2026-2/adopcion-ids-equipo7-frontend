<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Perfil</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <main class="container">
        <div class="card">
            <h1>Crear Cuenta</h1>
            <input type="text" id="reg-nombre" placeholder="Nombre completo">
            <input type="email" id="reg-email" placeholder="Correo electrónico">
            <input type="text" id="reg-cp" placeholder="Código Postal">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button id="btn-register">Registrarme</button>
            <p class="error" id="reg-error"></p>
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
    </main>
    <script type="module" src="./js/register.js"></script>
</body>
</html>
