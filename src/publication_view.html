<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Perfil</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <header class="topbar">
        <h1>Perfil de mascota</h1>
        <nav class="nav">
            <a href="./home.html">Perfil</a>
            <a href="./update.html">Actualizar Datos</a>
            <a href="./mascotas.html">Explorar Mascotas</a>
            <a href="./publish_mascot.html">Dar en Adopción</a>
            <button id="btnLogout" class="btn btn-secondary">Logout</button>
        </nav>
    </header>
    <main class="container">
        <div class="card">
            <h1>Publicación de Adopción</h1>
            <p><strong>Nombre:</strong> <span id="mascot-name"></span></p>
            <div class="photo-container">
                <img id="mascot-photo" alt="Foto del animal">
            </div>
            <p><strong>Descripción:</strong></p>
            <div id="mascot-description"></div>
            <p><strong>Tipo:</strong> <span id="mascot-type"></span></p>
            <p><strong>Raza:</strong> <span id="mascot-breed"></span></p>
            <p><strong>Código Postal:</strong> <span id="mascot-zipcode"></span></p>
        </div>
        <div class="card">
            <button id="btn-editar" class="hidden">Editar Publicación</button>
            <button id="btn-adoptar" class="hidden">Confirmar Adopción</button>
            <button id="btn-eliminacion" class="hidden">Eliminar Publicación</button>
        </div>
        <div id="popin-confirmacion" class="hidden">
            <div class="popin-contenido">
                <h3>¿Confirmar adopción?</h3>
                <button id="btn-confirm-adopt">Sí, confirmar</button>
                <button id="btn-cancel">Cancelar</button>
            </div>
        </div>
        <div id="popin-eliminacion" class="hidden">
            <div class="popin-contenido">
                <h3>¿Confirmar eliminación de publicación?</h3>
                <button id="btn-confirm-elim">Sí, eliminar</button>
                <button id="btn-cancel-elim">Cancelar</button>
            </div>
        </div>
    <script type="module" src="./js/display.js"></script>
    </main>
</body>
</html>
