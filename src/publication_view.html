<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Perfil</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <main class="container">
        <div class="card">
            <h1>Publicación de Adopción</h1>
            <p><strong>Nombre:</strong> <span id="mascot-name"></span></p>
            <div class="photo-container">
                <img id="mascot-photo" alt="Foto del animal">
            </div>
            <p><strong>Descripción:</strong></p>
            <div id="mascot-description"></div>
            <p><strong>Tipo:</strong> <span id="mascot-type"></span></p>
            <p><strong>Raza:</strong> <span id="mascot-breed"></span></p>
            <p><strong>Código Postal:</strong> <span id="mascot-zipcode"></span></p>
        </div>
    <script type="module" src="./js/display.js"></script>
    </main>
</body>
</html>
