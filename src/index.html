<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Plataforma de Adopción</title>
    <link rel="stylesheet" href="styles.css"> <style>
        .hero { text-align: center; padding: 50px 20px; }
        .btn-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .btn { 
            padding: 15px 30px; 
            font-size: 1.1rem; 
            text-decoration: none; 
            border-radius: 5px; 
            transition: background 0.3s;
        }
        .btn-primary { background-color: #2c3e50; color: white; }
        .btn-secondary { border: 2px solid #2c3e50; color: #2c3e50; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Plataforma de Adopción</h1>
        <p>Encuentra a tu nuevo mejor amigo o ayuda a otros a encontrar un hogar.</p>
        
        <div class="btn-container">
            <a href="login.html" class="btn btn-primary" id="go-login">Iniciar Sesión</a>
            <a href="register.html" class="btn btn-secondary" id="go-register">Crear Cuenta</a>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
