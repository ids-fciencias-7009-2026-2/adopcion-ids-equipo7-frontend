<!doctype html>
<meta charset="utf-8" />
<title>Debug token</title>
<script>
  // Cualquier string sirve para “brincar” el redirect por falta de token
  // (si tu home además llama al backend, ahí sí necesitarás un token real)
  sessionStorage.setItem("token", "DEBUG_TOKEN");

  // Si tu código usa otra key, cámbiala (ej. "authToken" o "access_token")
  // sessionStorage.setItem("authToken", "DEBUG_TOKEN");

  location.href = "home.html";
</script>
